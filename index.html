
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تحدي اللغة العربية</title>
<style>
body{margin:0;font-family:Tahoma;background:linear-gradient(135deg,#4a0824,#fff0dc);overflow-x:hidden}
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:40px;color:white}
.panel{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);padding:35px;border-radius:35px}
h1{font-size:72px;margin:0;color:#fff4c2}
p{font-size:28px;line-height:2}
img.heroimg{width:100%;max-width:650px;filter:drop-shadow(0 25px 40px rgba(0,0,0,.35));animation:float 3s ease-in-out infinite}
.btn{display:inline-block;background:#f59e0b;color:white;padding:20px 40px;border-radius:25px;text-decoration:none;font-size:28px;font-weight:bold}
.logo{width:120px;background:white;border-radius:50%;padding:8px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
</style>
</head>
<body>
<section class="hero">
<div class="panel">
<img src="assets/logo.jpg" class="logo">
<h1>تحدي اللغة العربية 👑</h1>
<p>
تعلمي ✨ تنافسي ✨ واجمعي النجوم لتصبحي بطلة اللغة العربية مع سلامة الخارقة!
</p>
<a class="btn" href="#">ابدئي التحدي 🚀</a>
</div>
<div style="text-align:center">
<img src="assets/salama_superhero.png" class="heroimg">
</div>
</section>

<script>
const phrases=[
"أحسنتِ يا بطلة! 🌟",
"إجابة ذكية جدًا 👑",
"سلامة فخورة بكِ ✨",
"واو! استمري يا مبدعة 💗"
];
let i=0;
setInterval(()=>{
const utter=new SpeechSynthesisUtterance(phrases[i%phrases.length]);
utter.lang='ar';
utter.rate=.9;
speechSynthesis.speak(utter);
i++;
},12000);
</script>
</body>
</html>
