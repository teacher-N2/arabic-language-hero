<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تحدي اللغة العربية | بنك الأسئلة الموسع</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#3b071f;color:white;overflow:hidden}
.stage{width:100vw;height:100vh;position:relative;background:#3b071f;display:flex;align-items:center;justify-content:center}
.game-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.hotspot{position:absolute;border:2px solid transparent;border-radius:18px;background:rgba(255,255,255,.01);cursor:pointer;transition:.18s;z-index:5}
.hotspot:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.55);box-shadow:0 0 22px rgba(255,215,120,.75);transform:scale(1.015)}
.start{left:46%;top:43%;width:34%;height:8%;border-radius:28px}
.reading{left:31%;top:57%;width:12%;height:24%}
.grammar{left:44%;top:57%;width:12%;height:24%}
.vocab{left:57%;top:57%;width:12%;height:24%}
.expression{left:70%;top:57%;width:12%;height:24%}
.spelling{left:83%;top:57%;width:12%;height:24%}
.sound{left:1.5%;bottom:3%;width:7%;height:7%}
.music{left:9%;bottom:3%;width:7%;height:7%}
.help{left:16.5%;bottom:3%;width:7%;height:7%}
.score{position:absolute;top:12px;right:12px;z-index:6;background:rgba(59,7,31,.72);border:1px solid rgba(255,255,255,.25);color:white;padding:10px 14px;border-radius:18px;font-weight:900;backdrop-filter:blur(8px)}
.tip{position:absolute;right:50%;transform:translateX(50%);bottom:14px;z-index:6;background:rgba(59,7,31,.7);color:white;border-radius:999px;padding:10px 18px;font-weight:900;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22)}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(43,7,28,.84);z-index:20;padding:18px}
.overlay.show{display:flex}
.card{width:min(850px,96vw);background:linear-gradient(135deg,#fff7ed,#fff);color:#3b071f;border-radius:34px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.45);text-align:right;border:4px solid #f6b73c;max-height:92vh;overflow:auto}
.card h1{margin:0 0 10px;color:#8f1d4b;font-size:clamp(30px,5vw,54px)}
.card p{font-size:20px;line-height:2}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
.pill{background:#fce7f3;color:#8f1d4b;border-radius:999px;padding:7px 12px;font-weight:900}
.question{font-size:24px;font-weight:900;margin:18px 0;line-height:1.7}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{border:2px solid #f1ccda;background:white;color:#3b071f;border-radius:18px;padding:16px;font-size:18px;font-weight:900;cursor:pointer;text-align:right}
.option:hover{background:#fff0f6}
.option.correct{background:#dcfce7;border-color:#22c55e;color:#166534}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:14px;font-size:18px;font-weight:900;line-height:1.8}
.feedback.good{display:block;background:#dcfce7;color:#166534}
.feedback.bad{display:block;background:#fee2e2;color:#991b1b}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{border:none;border-radius:18px;padding:14px 24px;font-size:18px;font-weight:900;cursor:pointer}
.primary{background:linear-gradient(135deg,#8f1d4b,#c92d68);color:white}
.secondary{background:#f1d5df;color:#6b1235}
.confetti{position:fixed;top:-30px;font-size:28px;z-index:100;pointer-events:none;animation:fall 2.5s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@media(max-width:900px){.game-image{object-fit:contain;background:#3b071f}.tip{font-size:12px;bottom:8px}.score{font-size:13px}.options{grid-template-columns:1fr}}
</style>
</head>
<body>

</main>

<section id="overlay" class="overlay">

    <div id="feedback" class="feedback"></div>
    <div class="actions">

      <button class="btn secondary" onclick="closeOverlay()">العودة للواجهة</button>
    </div>
  </div>
</section>

const titles = {
  mixed:"تحدي شامل عشوائي 🚀",
  reading:"فهم النصوص والقراءة الداخلية 📖",
  grammar:"القواعد النحوية ✍️",
  spelling:"الإملاء 🛡️",
  memory:"الحفظ 🎤",
  external:"القراءة الخارجية 🌟"
};
let score = Number(localStorage.getItem("bigBankScore") || 0);
let current = "mixed";
let currentItem = null;
let answered = false;
document.getElementById("score").textContent = score;
document.getElementById("count").textContent = Object.values(bank).flat().length;

function pool(type){
  if(type === "mixed") return Object.entries(bank).flatMap(([cat, arr]) => arr.map(x => ({...x, cat})));
  return (bank[type] || []).map(x => ({...x, cat:type}));
}
function openChallenge(type){
  current = type;
  document.getElementById("title").textContent = titles[type];
  document.getElementById("intro").textContent = type === "mixed" ? "تحدي شامل يسحب أسئلة عشوائية من كل الفروع." : "أسئلة متنوعة من هذا الفرع.";
  next();
  document.getElementById("overlay").classList.add("show");
  say(titles[type]);
}
function next(){
  answered = false;
  const arr = pool(current);
  currentItem = arr[Math.floor(Math.random() * arr.length)];
  document.getElementById("categoryPill").textContent = categoryName(currentItem.cat);
  document.getElementById("progressPill").textContent = "سؤال عشوائي";
  document.getElementById("question").textContent = currentItem.q;
  const options = document.getElementById("options");
  options.innerHTML = "";
  const shuffled = [...currentItem.options].sort(() => Math.random() - .5);
  shuffled.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => check(opt, btn);
    options.appendChild(btn);
  });
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
}
function check(selected, btn){
  if(answered) return;
  answered = true;
  document.querySelectorAll(".option").forEach(b => {
    b.disabled = true;
    if(b.textContent === currentItem.a) b.classList.add("correct");
  });
  const fb = document.getElementById("feedback");
  if(selected === currentItem.a){
    btn.classList.add("correct");
    score += 10;
    localStorage.setItem("bigBankScore", score);
    document.getElementById("score").textContent = score;
    document.getElementById("correctSound").play().catch(()=>{});
    fb.className = "feedback good";
    fb.textContent = currentItem.msg + " +10 نقاط";
    say("أحسنت يا بطلة. " + currentItem.msg);
    celebrate();
  } else {
    btn.classList.add("wrong");
    document.getElementById("wrongSound").play().catch(()=>{});
    fb.className = "feedback bad";
    fb.textContent = "حاولي مرة أخرى. الإجابة الصحيحة هي: " + currentItem.a;
    say("حاولي مرة أخرى يا بطلة.");
  }
}
function closeOverlay(){ document.getElementById("overlay").classList.remove("show"); }
function openHelp(){
  document.getElementById("title").textContent = "المساعدة";
  document.getElementById("intro").textContent = "اضغطي على أي بوابة داخل الصورة. كل بوابة تفتح أسئلة عشوائية من بنك موسع مبني على محتوى الملف.";
  document.getElementById("categoryPill").textContent = "تعليمات";
  document.getElementById("progressPill").textContent = "جاهز";
  document.getElementById("question").textContent = "زر ابدئي التحدي يعطيك أسئلة شاملة من كل الفروع.";
  document.getElementById("options").innerHTML = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("overlay").classList.add("show");
}
function categoryName(cat){
  return {reading:"القراءة الداخلية", grammar:"القواعد", spelling:"الإملاء", memory:"الحفظ", external:"القراءة الخارجية"}[cat] || "شامل";
}
function say(text){
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ar";
    u.rate = .9;
    u.pitch = 1.35;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(e) {}
}
function celebrate(){
  const symbols = ["✨","⭐","🏆","🎉","💗"];
  for(let i=0;i<20;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDelay = (Math.random()*.6)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
