<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تحدي اللغة العربية | سلامة المرشدة</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Tahoma,Arial,sans-serif;background:#120516;color:white}
button{font-family:inherit;cursor:pointer}
.stage{position:relative;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at center,#5b1234,#120516 78%)}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(1.1) contrast(1.03);transform:scale(1.01)}
.vignette{position:absolute;inset:0;background:radial-gradient(circle at 55% 45%, transparent 38%, rgba(18,5,22,.18) 68%, rgba(18,5,22,.54) 100%);pointer-events:none}
.sparkle{position:absolute;z-index:4;font-size:22px;opacity:.9;animation:twinkle 2.4s ease-in-out infinite}
.s1{top:12%;left:16%;animation-delay:.1s}.s2{top:18%;right:18%;animation-delay:.7s}.s3{top:55%;left:23%;animation-delay:1.2s}.s4{bottom:12%;right:24%;animation-delay:.4s}.s5{bottom:18%;left:50%;animation-delay:1.6s}
@keyframes twinkle{0%,100%{transform:scale(.7);opacity:.45}50%{transform:scale(1.35);opacity:1}}
.hotspot{position:absolute;z-index:8;border:none;background:rgba(255,255,255,.01);border-radius:22px;transition:.22s;outline:none}
.hotspot::after{content:"";position:absolute;inset:0;border-radius:inherit;border:2px solid rgba(255,220,135,0);box-shadow:0 0 0 rgba(255,220,135,0);transition:.22s}
.hotspot:hover::after,.hotspot:focus::after{border-color:rgba(255,220,135,.9);box-shadow:0 0 26px rgba(255,190,80,.92), inset 0 0 30px rgba(255,255,255,.12)}
.hotspot:hover{transform:translateY(-4px) scale(1.015)}
.start{left:39.8%;top:37.2%;width:34%;height:8.5%;border-radius:40px}
.reading{left:22.5%;top:58.2%;width:12.2%;height:25.5%}
.grammar{left:35.2%;top:58.2%;width:12.2%;height:25.5%}
.vocab{left:48.1%;top:58.2%;width:12.2%;height:25.5%}
.expression{left:60.9%;top:58.2%;width:12.2%;height:25.5%}
.spelling{left:73.6%;top:58.2%;width:12.2%;height:25.5%}
.rewardBtn{left:1.8%;top:74.6%;width:16.2%;height:8.2%;border-radius:22px}
.sound{left:1.8%;bottom:3%;width:6.3%;height:7%}
.music{left:9.2%;bottom:3%;width:6.3%;height:7%}
.help{left:16.6%;bottom:3%;width:6.3%;height:7%}
.scorebar{position:absolute;top:12px;right:12px;z-index:12;background:rgba(58,7,31,.78);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:18px;padding:10px 14px;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.salama-caption{position:absolute;left:18px;top:12px;z-index:13;background:rgba(255,248,236,.94);color:#6b1235;border:2px solid rgba(245,185,66,.8);border-radius:22px;padding:12px 16px;max-width:390px;line-height:1.8;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.22)}
.hint{position:absolute;right:50%;bottom:12px;transform:translateX(50%);z-index:12;background:rgba(58,7,31,.76);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:999px;padding:10px 18px;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.25);font-size:15px}
.panel{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;background:rgba(22,5,18,.74);backdrop-filter:blur(6px);padding:16px}
.panel.show{display:flex}
.card{width:min(900px,96vw);max-height:92vh;overflow:auto;background:linear-gradient(135deg,#fff8ec,#fff);color:#3b071f;border-radius:34px;padding:28px;border:4px solid #f5b942;box-shadow:0 30px 90px rgba(0,0,0,.52);animation:pop .28s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.card h1{margin:0;color:#8f1d4b;font-size:clamp(32px,5vw,56px)}
.card p{font-size:20px;line-height:2;color:#5c3143}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{background:#fce7f3;color:#8f1d4b;border-radius:999px;padding:8px 13px;font-weight:900}
.question{font-size:clamp(22px,3vw,32px);line-height:1.7;font-weight:900;margin:16px 0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{border:2px solid #f1ccda;background:white;color:#3b071f;border-radius:18px;padding:16px;font-size:18px;font-weight:900;text-align:right}
.option:hover{background:#fff0f6}
.option.correct{background:#dcfce7;border-color:#22c55e;color:#166534;animation:glow .7s ease}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;animation:shake .35s ease}
@keyframes glow{0%{box-shadow:0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 28px rgba(34,197,94,.65)}100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(8px)}50%{transform:translateX(-8px)}75%{transform:translateX(5px)}}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:14px;font-size:18px;font-weight:900;line-height:1.8}
.feedback.good{display:block;background:#dcfce7;color:#166534}
.feedback.bad{display:block;background:#fee2e2;color:#991b1b}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{border:none;border-radius:18px;padding:14px 24px;font-size:18px;font-weight:900}
.primary{background:linear-gradient(135deg,#8f1d4b,#c92d68);color:white}
.secondary{background:#f1d5df;color:#6b1235}
.voice-note{background:#fff7ed;border:1px solid #f5d4a1;border-radius:16px;padding:12px;margin-top:14px;color:#6b1235;line-height:1.8;font-weight:800}
.confetti{position:fixed;top:-30px;font-size:28px;z-index:200;pointer-events:none;animation:fall 2.5s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@media(max-width:900px){
  body{overflow:auto}
  .stage{height:100svh}
  .bg{object-fit:contain;background:#120516}
  .hint{font-size:12px;width:92%;text-align:center;bottom:8px}
  .scorebar{font-size:13px;right:8px;top:8px}
  .salama-caption{left:8px;right:8px;top:58px;max-width:none;font-size:13px;padding:8px 10px}
  .options{grid-template-columns:1fr}
  .hotspot:hover{transform:none}
}
</style>
</head>
<body>
<main class="stage">
  <img src="assets/cinematic_ui.png" class="bg" alt="تحدي اللغة العربية">
  <div class="vignette"></div>
  <div class="sparkle s1">✨</div><div class="sparkle s2">⭐</div><div class="sparkle s3">✨</div><div class="sparkle s4">🌟</div><div class="sparkle s5">✨</div>
  <div class="scorebar">النقاط: <span id="score">0</span> ⭐</div>
  <div id="salamaCaption" class="salama-caption">مرحبًا يا بطلة السلام! هيا نبدأ تحدي اللغة العربية.</div>
  <div class="hint">اضغطي على البوابات المضيئة داخل عالم اللعبة ✨</div>

  <button class="hotspot start" onclick="openGate('mixed')" aria-label="ابدئي التحدي"></button>
  <button class="hotspot reading" onclick="openGate('reading')" aria-label="الفهم والاستيعاب"></button>
  <button class="hotspot grammar" onclick="openGate('grammar')" aria-label="القواعد النحوية"></button>
  <button class="hotspot vocab" onclick="openGate('vocab')" aria-label="المفردات"></button>
  <button class="hotspot expression" onclick="openGate('expression')" aria-label="البلاغة والتعبير"></button>
  <button class="hotspot spelling" onclick="openGate('spelling')" aria-label="الإملاء والخط"></button>
  <button class="hotspot rewardBtn" onclick="openReward()" aria-label="المكافآت"></button>
  <button class="hotspot sound" onclick="toggleVoice()" aria-label="الصوت"></button>
  <button class="hotspot music" onclick="salamaSay('welcome')" aria-label="عبارة ترحيب"></button>
  <button class="hotspot help" onclick="openHelp()" aria-label="المساعدة"></button>
</main>

<section id="panel" class="panel">
  <div class="card">
    <h1 id="title">تحدي اللغة العربية</h1>
    <p id="intro">اختاري الإجابة الصحيحة.</p>
    <div class="meta">
      <span class="pill" id="cat">بوابة</span>
      <span class="pill">+10 نقاط</span>
    </div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <div id="voiceNote" class="voice-note">الصوت مفعّل بعبارات سلامة المحددة، ولن يقرأ الإيموجيات أو نص السؤال عشوائيًا.</div>
    <div class="actions">
      <button class="btn primary" onclick="nextQuestion()">سؤال جديد ✨</button>
      <button class="btn secondary" onclick="closePanel()">العودة للواجهة</button>
    </div>
  </div>
</section>

<audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
const bank = {"reading": [{"q": "ما الفكرة العامة لنص «العمل الجماعي»؟", "options": ["أهمية العمل الجماعي", "وصف السوق", "فوائد النوم", "أهمية السفر"], "a": "أهمية العمل الجماعي"}, {"q": "ماذا يريد الحفيد من جدته في درس «رسالة إلى جدتي»؟", "options": ["أن تحكي له أجمل الحكايات", "أن تسافر بعيدًا", "أن تترك الرسائل", "أن تغلق البيت"], "a": "أن تحكي له أجمل الحكايات"}, {"q": "ما الغرض من رسالة الأحفاد إلى الجدة؟", "options": ["دعوة الجدة إلى العودة", "وصف المدرسة", "شراء كتاب", "طلب رحلة"], "a": "دعوة الجدة إلى العودة"}], "grammar": [{"q": "صوغي اسم الفاعل من الفعل: كتب.", "options": ["كاتب", "مكتوب", "كتاب", "كتابة"], "a": "كاتب"}, {"q": "سجدتُ لله سجودًا. نوع المفعول المطلق:", "options": ["مؤكد للفعل", "مبين للنوع", "مبين للعدد", "فاعل"], "a": "مؤكد للفعل"}, {"q": "دار الطائر دورتين. كلمة «دورتين» تعرب:", "options": ["مفعولًا مطلقًا مبينًا للعدد", "فاعلًا مرفوعًا", "خبرًا مرفوعًا", "مبتدأً مرفوعًا"], "a": "مفعولًا مطلقًا مبينًا للعدد"}], "vocab": [{"q": "ما معنى كلمة «حثيثًا»؟", "options": ["سريعًا", "بطيئًا", "حزينًا", "قليلًا"], "a": "سريعًا"}, {"q": "ما مضاد كلمة «كدّ»؟", "options": ["راحة", "تعب", "اجتهاد", "عمل"], "a": "راحة"}], "expression": [{"q": "أي قيمة يدل عليها قول: اليد الواحدة لا تصفق؟", "options": ["التعاون", "الخوف", "التردد", "الكسل"], "a": "التعاون"}, {"q": "ما القيمة التي تدل عليها قصيدة «الصغير الكبير»؟", "options": ["الطموح وعلو الهمة", "الإهمال", "الخوف", "التراجع"], "a": "الطموح وعلو الهمة"}], "spelling": [{"q": "اختاري الكتابة الصحيحة عند الإضافة:", "options": ["معلما العلوم", "معلمان العلوم", "معلمين العلوم", "معلمون العلوم"], "a": "معلما العلوم"}, {"q": "أي عبارة كُتبت كتابة صحيحة؟", "options": ["مهندسا المشروع", "مهندسان المشروع", "مهندسين المشروع", "مهندسون المشروع"], "a": "مهندسا المشروع"}], "mixed": [{"q": "ما الفكرة العامة لنص «العمل الجماعي»؟", "options": ["أهمية العمل الجماعي", "وصف السوق", "فوائد النوم", "أهمية السفر"], "a": "أهمية العمل الجماعي"}, {"q": "ماذا يريد الحفيد من جدته في درس «رسالة إلى جدتي»؟", "options": ["أن تحكي له أجمل الحكايات", "أن تسافر بعيدًا", "أن تترك الرسائل", "أن تغلق البيت"], "a": "أن تحكي له أجمل الحكايات"}, {"q": "ما الغرض من رسالة الأحفاد إلى الجدة؟", "options": ["دعوة الجدة إلى العودة", "وصف المدرسة", "شراء كتاب", "طلب رحلة"], "a": "دعوة الجدة إلى العودة"}, {"q": "صوغي اسم الفاعل من الفعل: كتب.", "options": ["كاتب", "مكتوب", "كتاب", "كتابة"], "a": "كاتب"}, {"q": "سجدتُ لله سجودًا. نوع المفعول المطلق:", "options": ["مؤكد للفعل", "مبين للنوع", "مبين للعدد", "فاعل"], "a": "مؤكد للفعل"}, {"q": "دار الطائر دورتين. كلمة «دورتين» تعرب:", "options": ["مفعولًا مطلقًا مبينًا للعدد", "فاعلًا مرفوعًا", "خبرًا مرفوعًا", "مبتدأً مرفوعًا"], "a": "مفعولًا مطلقًا مبينًا للعدد"}, {"q": "ما معنى كلمة «حثيثًا»؟", "options": ["سريعًا", "بطيئًا", "حزينًا", "قليلًا"], "a": "سريعًا"}, {"q": "ما مضاد كلمة «كدّ»؟", "options": ["راحة", "تعب", "اجتهاد", "عمل"], "a": "راحة"}, {"q": "أي قيمة يدل عليها قول: اليد الواحدة لا تصفق؟", "options": ["التعاون", "الخوف", "التردد", "الكسل"], "a": "التعاون"}, {"q": "ما القيمة التي تدل عليها قصيدة «الصغير الكبير»؟", "options": ["الطموح وعلو الهمة", "الإهمال", "الخوف", "التراجع"], "a": "الطموح وعلو الهمة"}, {"q": "اختاري الكتابة الصحيحة عند الإضافة:", "options": ["معلما العلوم", "معلمان العلوم", "معلمين العلوم", "معلمون العلوم"], "a": "معلما العلوم"}, {"q": "أي عبارة كُتبت كتابة صحيحة؟", "options": ["مهندسا المشروع", "مهندسان المشروع", "مهندسين المشروع", "مهندسون المشروع"], "a": "مهندسا المشروع"}]};
const phrases = {"welcomeDisplay": "مرحبًا يا بطلة السلام! هيا نبدأ تحدي اللغة العربية.", "welcomeVoice": "مرحبًا يا بطلة السلام. هيا نبدأ تحدي اللغة العربية.", "gate": {"reading": "تم فتح بوابة الفهم والاستيعاب.", "grammar": "تم فتح بوابة القواعد النحوية.", "vocab": "تم فتح بوابة المفردات.", "expression": "تم فتح بوابة البلاغة والتعبير.", "spelling": "تم فتح بوابة الإملاء والخط.", "mixed": "تم فتح التحدي الشامل."}, "correct": ["أحسنتِ يا بطلة السلام!", "رائعة! إجابة ذكية جدًا.", "سلامة فخورة بكِ.", "مذهلة! واصلي التحدي.", "إجابتكِ موفقة يا نجمة اللغة العربية."], "wrong": ["قريبة جدًا، حاولي مرة أخرى.", "لا بأس يا بطلة، فكّري قليلًا.", "أنتِ تستطيعين، أعيدي المحاولة بثقة.", "خطوة جديدة نحو التعلم، لا تتوقفي."], "win": ["مبارك! اجتزتِ هذه البوابة بنجاح.", "إنجاز رائع! اقتربتِ من لقب بطلة اللغة العربية.", "سلامة تهنئكِ على هذا التقدم الجميل."]};
const titles = {
  mixed:"التحدي الشامل",
  reading:"الفهم والاستيعاب",
  grammar:"القواعد النحوية",
  vocab:"المفردات",
  expression:"البلاغة والتعبير",
  spelling:"الإملاء والخط"
};
let score = Number(localStorage.getItem("salamaGuideScore") || 0);
let currentGate = "mixed";
let currentItem = null;
let answered = false;
let voiceEnabled = localStorage.getItem("voiceEnabled") !== "false";
let preferredVoice = null;

document.getElementById("score").textContent = score;

function loadVoices(){
  const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
  preferredVoice = voices.find(v => /ar/i.test(v.lang) && /female|woman|mona|layla|salma|hoda|zira|sara|sarah/i.test(v.name)) 
    || voices.find(v => /ar/i.test(v.lang)) 
    || voices.find(v => /female|woman|zira|sara|sarah/i.test(v.name))
    || null;
}
if("speechSynthesis" in window){
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function getPool(gate){
  return gate === "mixed" ? bank.mixed : (bank[gate] || bank.mixed);
}
function openGate(gate){
  currentGate = gate;
  document.getElementById("title").textContent = titles[gate];
  document.getElementById("intro").textContent = gate === "mixed" ? "تحدي شامل من جميع فروع اللغة العربية." : "تحدي هذه البوابة من بنك الأسئلة.";
  nextQuestion();
  document.getElementById("panel").classList.add("show");
  setCaption(phrases.gate[gate] || "تم فتح البوابة.");
  speakPhrase(phrases.gate[gate] || "تم فتح البوابة.");
}
function nextQuestion(){
  answered = false;
  const pool = getPool(currentGate);
  currentItem = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById("cat").textContent = titles[currentGate] || "تحدي";
  document.getElementById("question").textContent = currentItem.q;
  const opts = [...currentItem.options].sort(()=>Math.random()-.5);
  const box = document.getElementById("options");
  box.innerHTML = "";
  opts.forEach(o => {
    const b = document.createElement("button");
    b.className = "option";
    b.textContent = o;
    b.onclick = () => check(o,b);
    box.appendChild(b);
  });
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
}
function check(selected,btn){
  if(answered) return;
  answered = true;
  document.querySelectorAll(".option").forEach(b => {
    b.disabled = true;
    if(b.textContent === currentItem.a) b.classList.add("correct");
  });
  const fb = document.getElementById("feedback");
  if(selected === currentItem.a){
    btn.classList.add("correct");
    score += 10;
    localStorage.setItem("salamaGuideScore", score);
    document.getElementById("score").textContent = score;
    const msg = randomOf(phrases.correct);
    fb.className = "feedback good";
    fb.textContent = msg + " +10 نقاط";
    setCaption(msg);
    playFx("correctSound");
    speakPhrase(msg);
    confetti();
  } else {
    btn.classList.add("wrong");
    const msg = randomOf(phrases.wrong);
    fb.className = "feedback bad";
    fb.textContent = msg + " الإجابة الصحيحة هي: " + currentItem.a;
    setCaption(msg);
    playFx("wrongSound");
    speakPhrase(msg);
  }
}
function randomOf(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function openReward(){
  const msg = score >= 80 ? "مبارك! اقتربتِ من لقب بطلة اللغة العربية." : "اجمعي المزيد من النجوم لفتح مكافآت أكبر.";
  document.getElementById("title").textContent = "صندوق المكافآت";
  document.getElementById("intro").textContent = "اجمعي النقاط والشارات لتصبحي بطلة اللغة العربية.";
  document.getElementById("cat").textContent = "مكافآت";
  document.getElementById("question").textContent = msg;
  document.getElementById("options").innerHTML = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("panel").classList.add("show");
  setCaption(msg);
  speakPhrase(msg);
}
function openHelp(){
  document.getElementById("title").textContent = "طريقة اللعب";
  document.getElementById("intro").textContent = "اضغطي على البوابات المضيئة. ستظهر الأسئلة، وستعلّق سلامة بعبارات محددة ومتقنة.";
  document.getElementById("cat").textContent = "مساعدة";
  document.getElementById("question").textContent = "الصوت لا يقرأ الإيموجيات، ولا يقرأ السؤال كاملًا؛ بل يستخدم عبارات سلامة الجاهزة فقط.";
  document.getElementById("options").innerHTML = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("panel").classList.add("show");
  speakPhrase("اضغطي على أي بوابة مضيئة لبدء التحدي.");
}
function closePanel(){ document.getElementById("panel").classList.remove("show"); }
function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  localStorage.setItem("voiceEnabled", voiceEnabled ? "true" : "false");
  const msg = voiceEnabled ? "تم تفعيل صوت سلامة." : "تم إيقاف صوت سلامة.";
  setCaption(msg);
  if(voiceEnabled) speakPhrase(msg);
}
function salamaSay(type){
  if(type === "welcome"){
    setCaption(phrases.welcomeDisplay);
    speakPhrase(phrases.welcomeVoice);
  }
}
function setCaption(text){
  document.getElementById("salamaCaption").textContent = text;
}
function speakPhrase(text){
  try{
    if(!voiceEnabled || !("speechSynthesis" in window)) return;
    const clean = String(text)
      .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,"")
      .replace(/✨|⭐|🚀|🏆|🎁|💗|👏|🌷|💪/g,"")
      .trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "ar";
    u.rate = 0.88;
    u.pitch = 1.65;
    if(preferredVoice) u.voice = preferredVoice;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}
function playFx(id){
  const a = document.getElementById(id);
  if(a){ a.currentTime=0; a.play().catch(()=>{}); }
}
function confetti(){
  const sym=["✨","⭐","🌟","🏆","💗"];
  for(let i=0;i<22;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.textContent=sym[Math.floor(Math.random()*sym.length)];
    c.style.left=Math.random()*100+"vw";
    c.style.animationDelay=(Math.random()*.5)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
setTimeout(()=>salamaSay("welcome"), 800);
