<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تحدي اللغة العربية | بوابات نظيفة وبنك موسع</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:Tahoma,Arial,sans-serif;background:#150516;color:white;overflow:hidden}
button{font-family:inherit;cursor:pointer}
.stage{position:relative;width:100vw;height:100vh;background:radial-gradient(circle at center,#5c1534,#150516 72%);overflow:hidden}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(1.08) contrast(1.03)}
.vignette{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,0) 38%,rgba(21,5,22,.22) 80%,rgba(21,5,22,.58) 100%);pointer-events:none}
.uiLayer{position:absolute;inset:0;z-index:8}
.portal{fill:rgba(255,255,255,.01);stroke:rgba(255,223,130,0);stroke-width:3;cursor:pointer;transition:.2s;filter:drop-shadow(0 0 0 rgba(255,210,100,0))}
.portal:hover{fill:rgba(255,236,190,.10);stroke:rgba(255,223,130,.95);filter:drop-shadow(0 0 14px rgba(255,200,80,.95))}
.startPulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 0 rgba(255,220,130,.1))}50%{filter:drop-shadow(0 0 16px rgba(255,220,130,.95))}}
.scorebar{position:absolute;top:10px;right:10px;z-index:12;background:rgba(58,7,31,.78);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:18px;padding:10px 14px;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.caption{position:absolute;top:10px;left:10px;z-index:12;max-width:430px;background:rgba(255,248,236,.96);color:#6b1235;border:2px solid rgba(245,185,66,.9);border-radius:22px;padding:12px 16px;line-height:1.8;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.22)}
.hint{position:absolute;bottom:10px;right:50%;transform:translateX(50%);z-index:12;background:rgba(58,7,31,.70);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 18px;font-weight:900;backdrop-filter:blur(10px);box-shadow:0 10px 25px rgba(0,0,0,.25)}
.panel{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;background:rgba(22,5,18,.74);backdrop-filter:blur(7px);padding:16px}
.panel.show{display:flex}
.card{width:min(920px,96vw);max-height:92vh;overflow:auto;background:linear-gradient(135deg,#fff8ec,#fff);color:#3b071f;border-radius:34px;padding:28px;border:4px solid #f5b942;box-shadow:0 30px 90px rgba(0,0,0,.52);animation:pop .28s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.card h1{margin:0;color:#8f1d4b;font-size:clamp(32px,5vw,56px)}
.card p{font-size:20px;line-height:2;color:#5c3143}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{background:#fce7f3;color:#8f1d4b;border-radius:999px;padding:8px 13px;font-weight:900}
.question{font-size:clamp(22px,3vw,32px);line-height:1.7;font-weight:900;margin:16px 0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{border:2px solid #f1ccda;background:white;color:#3b071f;border-radius:18px;padding:16px;font-size:18px;font-weight:900;text-align:right}
.option:hover{background:#fff0f6}
.option.correct{background:#dcfce7;border-color:#22c55e;color:#166534;animation:glow .7s ease}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;animation:shake .35s ease}
@keyframes glow{0%{box-shadow:0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 28px rgba(34,197,94,.65)}100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(8px)}50%{transform:translateX(-8px)}75%{transform:translateX(5px)}}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:14px;font-size:18px;font-weight:900;line-height:1.8}
.feedback.good{display:block;background:#dcfce7;color:#166534}
.feedback.bad{display:block;background:#fee2e2;color:#991b1b}
.tipBox{background:#fff7ed;border:1px solid #f5d4a1;border-radius:16px;padding:12px;margin-top:14px;color:#6b1235;line-height:1.8;font-weight:800}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{border:none;border-radius:18px;padding:14px 24px;font-size:18px;font-weight:900}
.primary{background:linear-gradient(135deg,#8f1d4b,#c92d68);color:white}
.secondary{background:#f1d5df;color:#6b1235}
.confetti{position:fixed;top:-30px;font-size:28px;z-index:200;pointer-events:none;animation:fall 2.5s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@media(max-width:900px){
 body{overflow:auto} .stage{height:100svh} .bg{object-fit:contain;background:#150516}
 .caption{top:58px;left:8px;right:8px;max-width:none;font-size:13px;padding:8px 10px}
 .scorebar{font-size:13px;right:8px;top:8px} .hint{font-size:12px;width:92%;text-align:center;bottom:8px}
 .options{grid-template-columns:1fr}
}
.confetti{position:fixed;top:-30px;font-size:28px;z-index:200;pointer-events:none;animation:fall 2.5s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
</style>
</head>
<body>

</main>

<section id="panel" class="panel">
  <div class="card">
    <h1 id="title">تحدي اللغة العربية</h1>
    <p id="intro">اختاري الإجابة الصحيحة.</p>
    <div class="meta">
      <span class="pill" id="cat">بوابة</span>
      <span class="pill">+10 نقاط</span>
    </div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <div id="tipBox" class="tipBox">سلامة ستعطيك تلميحًا قصيرًا بعد السؤال.</div>
    <div class="actions">
      <button class="btn primary" onclick="nextQuestion()">سؤال جديد ✨</button>
      <button class="btn secondary" onclick="closePanel()">العودة للواجهة</button>
    </div>
  </div>
</section>

const titles = {mixed:"التحدي الشامل",reading:"الفهم والاستيعاب",grammar:"القواعد النحوية",vocab:"القراءة الخارجية والمفردات",expression:"الحفظ والتعبير",spelling:"الإملاء والخط"};
let score = Number(localStorage.getItem("cleanPortalScore") || 0);
let currentGate = "mixed";
let currentItem = null;
let answered = false;
document.getElementById("score").textContent = score;
document.getElementById("count").textContent = bank.mixed.length;

function setCaption(text){document.getElementById("caption").textContent=text;}
function play(id){const a=document.getElementById(id); if(a){a.currentTime=0; a.play().catch(()=>{});}}
function tryVoice(ids){for(const id of ids){const a=document.getElementById(id); if(a && a.readyState>0){a.currentTime=0; a.play().catch(()=>{}); return true;}} return false;}
function getPool(gate){return gate==="mixed"?bank.mixed:(bank[gate]||bank.mixed);}
function openGate(gate){
 currentGate=gate; play("portalSound");
 const line=salama.gate[gate]||"تم فتح البوابة."; setCaption(line);
 document.getElementById("title").textContent=titles[gate];
 document.getElementById("intro").textContent=gate==="mixed"?"تحدي شامل من جميع فروع اللغة العربية.":"تحدي هذه البوابة من بنك الأسئلة.";
 nextQuestion(); document.getElementById("panel").classList.add("show");
}
function nextQuestion(){
 answered=false; const pool=getPool(currentGate); currentItem=pool[Math.floor(Math.random()*pool.length)];
 document.getElementById("cat").textContent=titles[currentGate]||"تحدي";
 document.getElementById("question").textContent=currentItem.q;
 document.getElementById("tipBox").textContent=currentItem.tip||"اقرئي السؤال بتركيز قبل اختيار الإجابة.";
 const box=document.getElementById("options"); box.innerHTML="";
 [...currentItem.options].sort(()=>Math.random()-.5).forEach(o=>{const b=document.createElement("button"); b.className="option"; b.textContent=o; b.onclick=()=>checkAnswer(o,b); box.appendChild(b);});
 const fb=document.getElementById("feedback"); fb.className="feedback"; fb.textContent="";
}
function randomOf(arr){return arr[Math.floor(Math.random()*arr.length)];}
function checkAnswer(selected,btn){
 if(answered) return; answered=true;
 document.querySelectorAll(".option").forEach(b=>{b.disabled=true; if(b.textContent===currentItem.a) b.classList.add("correct");});
 const fb=document.getElementById("feedback");
 if(selected===currentItem.a){
   btn.classList.add("correct"); score+=10; localStorage.setItem("cleanPortalScore",score); document.getElementById("score").textContent=score;
   const msg=randomOf(salama.correct); fb.className="feedback good"; fb.textContent=msg+" +10 نقاط"; setCaption(msg); play("correctSound"); tryVoice(["voiceCorrect1","voiceCorrect2"]); confetti();
 }else{
   btn.classList.add("wrong"); const msg=randomOf(salama.wrong); fb.className="feedback bad"; fb.textContent=msg+" الإجابة الصحيحة هي: "+currentItem.a; setCaption(msg); play("wrongSound"); tryVoice(["voiceWrong1","voiceWrong2"]);
 }
}
function openReward(){
 play("winSound"); const msg=score>=80?"مبارك! اقتربتِ من لقب بطلة اللغة العربية.":"اجمعي المزيد من النجوم لفتح مكافآت أكبر."; setCaption(msg);
 document.getElementById("title").textContent="صندوق المكافآت"; document.getElementById("intro").textContent="اجمعي النقاط والشارات لتصبحي بطلة اللغة العربية."; document.getElementById("cat").textContent="مكافآت"; document.getElementById("question").textContent=msg; document.getElementById("options").innerHTML=""; document.getElementById("feedback").className="feedback"; document.getElementById("tipBox").textContent="أضيفي ملفات صوت سلامة الحقيقية داخل assets/voices وسيتم تشغيلها تلقائيًا."; document.getElementById("panel").classList.add("show"); tryVoice(["voiceWin"]);
}
function closePanel(){document.getElementById("panel").classList.remove("show");}
function confetti(){const symbols=["✨","⭐","🌟","🏆","💗"]; for(let i=0;i<22;i++){const c=document.createElement("div"); c.className="confetti"; c.textContent=symbols[Math.floor(Math.random()*symbols.length)]; c.style.left=Math.random()*100+"vw"; c.style.animationDelay=(Math.random()*.45)+"s"; document.body.appendChild(c); setTimeout(()=>c.remove(),3000);}}
