<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>تحدي اللغة العربية | نسخة متجاوبة</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;font-family:Tahoma,Arial,sans-serif;background:#140516;color:white}
body{overflow:auto}
button{font-family:inherit;cursor:pointer}
.shell{
  width:100%;
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  background:
    radial-gradient(circle at center,#5c1534,#140516 70%),
    linear-gradient(135deg,#140516,#3b071f);
}
.stage{
  position:relative;
  width:min(100vw - 24px, 1600px);
  aspect-ratio:16/9;
  max-height:calc(100svh - 24px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 22px 70px rgba(0,0,0,.45);
  background:#140516;
}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#140516}
.vignette{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,0) 42%,rgba(20,5,22,.20) 82%,rgba(20,5,22,.55) 100%);pointer-events:none}
.uiLayer{position:absolute;inset:0;z-index:8}
.portal{fill:rgba(255,255,255,.01);stroke:rgba(255,223,130,0);stroke-width:3;cursor:pointer;transition:.2s;filter:drop-shadow(0 0 0 rgba(255,210,100,0))}
.portal:hover,.portal:focus{fill:rgba(255,236,190,.10);stroke:rgba(255,223,130,.95);filter:drop-shadow(0 0 14px rgba(255,200,80,.95))}
.startPulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 0 rgba(255,220,130,.1))}50%{filter:drop-shadow(0 0 16px rgba(255,220,130,.95))}}
.scorebar{position:absolute;top:1.2%;right:1.2%;z-index:12;background:rgba(58,7,31,.78);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:14px;padding:.65rem .9rem;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.25);font-size:clamp(12px,1.25vw,18px)}
.caption{position:absolute;top:1.2%;left:1.2%;z-index:12;max-width:min(420px,38%);background:rgba(255,248,236,.96);color:#6b1235;border:2px solid rgba(245,185,66,.9);border-radius:18px;padding:.7rem .9rem;line-height:1.65;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.22);font-size:clamp(12px,1.15vw,17px)}
.hint{position:absolute;bottom:1.3%;right:50%;transform:translateX(50%);z-index:12;background:rgba(58,7,31,.70);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:.55rem 1rem;font-weight:900;backdrop-filter:blur(10px);box-shadow:0 10px 25px rgba(0,0,0,.25);font-size:clamp(11px,1.1vw,16px);white-space:nowrap}
.panel{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;background:rgba(22,5,18,.74);backdrop-filter:blur(7px);padding:16px}
.panel.show{display:flex}
.card{width:min(920px,96vw);max-height:92svh;overflow:auto;background:linear-gradient(135deg,#fff8ec,#fff);color:#3b071f;border-radius:34px;padding:28px;border:4px solid #f5b942;box-shadow:0 30px 90px rgba(0,0,0,.52);animation:pop .28s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.card h1{margin:0;color:#8f1d4b;font-size:clamp(30px,5vw,56px)}
.card p{font-size:clamp(16px,2vw,20px);line-height:2;color:#5c3143}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{background:#fce7f3;color:#8f1d4b;border-radius:999px;padding:8px 13px;font-weight:900}
.question{font-size:clamp(21px,3vw,32px);line-height:1.7;font-weight:900;margin:16px 0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{border:2px solid #f1ccda;background:white;color:#3b071f;border-radius:18px;padding:16px;font-size:clamp(16px,2vw,18px);font-weight:900;text-align:right}
.option:hover{background:#fff0f6}
.option.correct{background:#dcfce7;border-color:#22c55e;color:#166534;animation:glow .7s ease}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;animation:shake .35s ease}
@keyframes glow{0%{box-shadow:0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 28px rgba(34,197,94,.65)}100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(8px)}50%{transform:translateX(-8px)}75%{transform:translateX(5px)}}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:14px;font-size:clamp(16px,2vw,18px);font-weight:900;line-height:1.8}
.feedback.good{display:block;background:#dcfce7;color:#166534}
.feedback.bad{display:block;background:#fee2e2;color:#991b1b}
.tipBox{background:#fff7ed;border:1px solid #f5d4a1;border-radius:16px;padding:12px;margin-top:14px;color:#6b1235;line-height:1.8;font-weight:800}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{border:none;border-radius:18px;padding:14px 24px;font-size:17px;font-weight:900}
.primary{background:linear-gradient(135deg,#8f1d4b,#c92d68);color:white}
.secondary{background:#f1d5df;color:#6b1235}
.confetti{position:fixed;top:-30px;font-size:28px;z-index:200;pointer-events:none;animation:fall 2.5s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@media (max-aspect-ratio: 16/9){
  .stage{width:100vw;max-height:none;height:auto;border-radius:0}
  .shell{align-items:flex-start;padding:0;min-height:100svh}
}
@media(max-width:900px){
  .shell{padding:0;align-items:flex-start}
  .stage{width:100vw;border-radius:0;box-shadow:none}
  .scorebar{font-size:11px;padding:.45rem .6rem;border-radius:10px}
  .caption{display:none}
  .hint{font-size:10px;bottom:.5%;padding:.4rem .7rem;white-space:normal;width:92%;text-align:center}
  .options{grid-template-columns:1fr}
  .card{padding:18px;border-radius:24px}
}
@media(max-width:480px){
  .scorebar{font-size:10px}
  .hint{display:none}
  .btn{width:100%}
}
</style>
</head>
<body>
<div class="shell">
<main class="stage" id="stage">
  <img src="assets/game_world.png" class="bg" alt="واجهة تحدي اللغة العربية">
  <div class="vignette"></div>
  <div class="scorebar">النقاط: <span id="score">0</span> ⭐ | بنك الأسئلة: <span id="count">0</span></div>
  <div id="caption" class="caption">مرحبًا يا بطلة السلام! اختاري بوابتك، وابدئي تحدي اللغة العربية.</div>
  <div class="hint">متجاوبة مع الجوال والآيباد واللابتوب — اضغطي على البوابات نفسها.</div>

  <svg class="uiLayer" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid meet">
    <polygon class="portal startPulse" onclick="openGate('mixed')" points="560,310 1010,310 1065,390 515,390" />
    <polygon class="portal" onclick="openGate('spelling')" points="265,570 420,545 455,850 240,850" />
    <polygon class="portal" onclick="openGate('grammar')" points="455,555 610,540 635,850 430,850" />
    <polygon class="portal" onclick="openGate('vocab')" points="650,545 810,545 815,850 625,850" />
    <polygon class="portal" onclick="openGate('expression')" points="850,545 1015,560 1025,850 825,850" />
    <polygon class="portal" onclick="openGate('reading')" points="1045,550 1220,575 1240,850 1025,850" />
    <polygon class="portal" onclick="openReward()" points="28,760 245,760 245,835 28,835" />
  </svg>
</main>
</div>

<section id="panel" class="panel">
  <div class="card">
    <h1 id="title">تحدي اللغة العربية</h1>
    <p id="intro">اختاري الإجابة الصحيحة.</p>
    <div class="meta">
      <span class="pill" id="cat">بوابة</span>
      <span class="pill">+10 نقاط</span>
    </div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <div id="tipBox" class="tipBox">سلامة ستعطيك تلميحًا قصيرًا بعد السؤال.</div>
    <div class="actions">
      <button class="btn primary" onclick="nextQuestion()">سؤال جديد ✨</button>
      <button class="btn secondary" onclick="closePanel()">العودة للواجهة</button>
    </div>
  </div>
</section>

<audio id="correctSound" src="assets/correct.wav" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.wav" preload="auto"></audio>
<audio id="portalSound" src="assets/portal.wav" preload="auto"></audio>

let score = Number(localStorage.getItem("responsiveArabicScore") || 0);
let currentGate = "mixed";
let currentItem = null;
let answered = false;

document.getElementById("score").textContent = score;
document.getElementById("count").textContent = bank.mixed.length;

function setCaption(text){document.getElementById("caption").textContent=text;}
function play(id){const a=document.getElementById(id); if(a){a.currentTime=0; a.play().catch(()=>{});}}
function tryVoice(ids){for(const id of ids){const a=document.getElementById(id); if(a && a.readyState>0){a.currentTime=0; a.play().catch(()=>{}); return true;}} return false;}
function getPool(gate){return gate==="mixed"?bank.mixed:(bank[gate]||bank.mixed);}
function openGate(gate){
 currentGate=gate; play("portalSound");
 const line=salama.gate[gate]||"تم فتح البوابة."; setCaption(line);
 document.getElementById("title").textContent=titles[gate];
 document.getElementById("intro").textContent=gate==="mixed"?"تحدي شامل من جميع فروع اللغة العربية.":"تحدي هذه البوابة من بنك الأسئلة.";

}
function nextQuestion(){
 answered=false; const pool=getPool(currentGate); currentItem=pool[Math.floor(Math.random()*pool.length)];

 document.getElementById("question").textContent=currentItem.q;

 const box=document.getElementById("options"); box.innerHTML="";
 [...currentItem.options].sort(()=>Math.random()-.5).forEach(o=>{const b=document.createElement("button"); b.className="option"; b.textContent=o; b.onclick=()=>checkAnswer(o,b); box.appendChild(b);});
 const fb=document.getElementById("feedback"); fb.className="feedback"; fb.textContent="";
}
function randomOf(arr){return arr[Math.floor(Math.random()*arr.length)];}
function checkAnswer(selected,btn){
 if(answered) return; answered=true;
 document.querySelectorAll(".option").forEach(b=>{b.disabled=true; if(b.textContent===currentItem.a) b.classList.add("correct");});
 const fb=document.getElementById("feedback");
 if(selected===currentItem.a){
   btn.classList.add("correct"); score+=10; localStorage.setItem("responsiveArabicScore",score); document.getElementById("score").textContent=score;
   const msg=randomOf(salama.correct); fb.className="feedback good"; fb.textContent=msg+" +10 نقاط"; setCaption(msg); play("correctSound"); tryVoice(["voiceCorrect1","voiceCorrect2"]); confetti();

   btn.classList.add("wrong"); const msg=randomOf(salama.wrong); fb.className="feedback bad"; fb.textContent=msg+" الإجابة الصحيحة هي: "+currentItem.a; setCaption(msg); play("wrongSound"); tryVoice(["voiceWrong1","voiceWrong2"]);
 }
}
function openReward(){

}
